name: ottking
description: "Premium IPTV and Live Streaming Platform for Mobile and Android TV."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ১. ভিডিও প্লেব্যাক এবং লাইভ স্ট্রিমিং (HLS/M3U8 এবং DASH/MPD সাপোর্টের জন্য)
  video_player: ^2.8.2
  chewie: ^1.7.5 # এটি ভিডিও প্লেয়ারের জন্য সুন্দর ইউআই এবং রিমোট ফোকাস কন্ট্রোল দেয়

  # ২. রিমোট কন্ট্রোল এবং কি-বোর্ড ইভেন্ট নিখুঁত করার জন্য (টিভি রিমোট নেভিগেশন)
  flutter_vlc_player: ^7.4.1 # অপ্টিমাইজড ভিডিও প্রসেসিং এবং কমদামী টিভির হարդওয়্যার ডিকোডিংয়ের জন্য বেস্ট অল্টারনেটিভ

  # ৩. নেটওয়ার্ক চেক এবং এপিআই কলিং
  http: ^1.2.0
  connectivity_plus: ^5.0.2 # ইন্টারনেট কানেকশন চলে গেলে টিভিতে অ্যালার্ট দেখানোর জন্য

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ৪. ওটিটি বা আইপিটিভি অ্যাপের ইমেজ, লোগো এবং অ্যাসেট পাথ এখানে ডিফাইন করতে হবে
  assets:
    - assets/images/
    # - assets/images/tv_banner.png # টিভির জন্য যদি ইন-অ্যাপ ব্যানার ব্যবহার করেন