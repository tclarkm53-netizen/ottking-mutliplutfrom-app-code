name: Force Generate New Keystore and Configure Android
on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Keystore Alias (যেমন: ottking_alias)'
        required: true
        default: 'ottking_alias'
      key_password:
        description: 'Keystore & Store Password'
        required: true
        default: 'ottking_by_anirbansumon_&_im_rasel'
      developer_name:
        description: 'CN Name (আপনার নাম বা ব্র্যান্ডের নাম)'
        required: true
        default: 'AnirbanSumon'

jobs:
  configure_signing:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Clean and Generate New Keystore
        run: |
          # ১. আগে যদি কোনো ফাইল থেকে থাকে, সেগুলোকে সম্পূর্ণ রিমুভ করা হচ্ছে (রিরাইট নিশ্চিত করতে)
          rm -f android/app/release.jks
          rm -f android/app/key.properties
          rm -f android/key.properties

          # ২. অ্যান্ড্রয়েড অ্যাপের সঠিক ডিরেক্টরি তৈরি করা
          mkdir -p android/app

          # ৩. Bash এনভায়রনমেন্টের জন্য পাসওয়ার্ড ভ্যারিয়েবল প্রিপেয়ার করা
          RAW_PASS="${{ github.event.inputs.key_password }}"
          ALIAS="${{ github.event.inputs.key_alias }}"
          DEV_NAME="${{ github.event.inputs.developer_name }}"

          # ৪. গ্র্যাডল (Java) যেন '&' রিড করতে পারে, তাই পাসওয়ার্ডে '\&' এস্কেপ করা হলো
          ESCAPED_PASS=$(echo "$RAW_PASS" | sed 's/&/\\&/g')

          # ৫. নতুন ফ্রেশ Keystore জেনারেট করা
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$RAW_PASS" \
            -keypass "$RAW_PASS" \
            -dname "CN=$DEV_NAME, OU=Dev, O=OTTking, L=Dhaka, S=Dhaka, C=BD"

          # ৬. স্বয়ংক্রিয়ভাবে android/app/key.properties ফাইল রাইট করা
          cat <<EOF > android/app/key.properties
          storePassword=$ESCAPED_PASS
          keyPassword=$ESCAPED_PASS
          keyAlias=$ALIAS
          storeFile=release.jks
          EOF

          echo "New Keystore and key.properties generated successfully."

      - name: Force Commit and Push Changes to Main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # আগের ট্র্যাক করা ফাইল থাকলে তা গিট ইনডেক্স থেকে রিমুভ করে ফ্রেশ অ্যাড করা
          git rm --cached android/app/release.jks android/app/key.properties || echo "No tracked files to remove"
          
          # ফোর্সড অ্যাড (যাতে .gitignore ফাইলে থাকলেও গিট বাধ্য হয়ে ট্র্যাক করে)
          git add -f android/app/release.jks
          git add -f android/app/key.properties
          
          git commit -m "🚨 FORCE REWRITE: New app signing properties and keystore generated" || echo "No changes to commit"
          
          # মেইন ব্রাঞ্চে ফোর্স পুশ করা হচ্ছে
          git push origin main
